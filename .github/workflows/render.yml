name: Render social exports (v2)

# Renderiza MP4/GIF/carrossel de um explainer da v2 sob demanda. Não roda em
# push/PR — é pesado (Chromium headless) e só faz sentido quando alguém pede.
on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Slug do explainer (ver v2/src/content/index.ts)"
        required: true
        type: string
      format:
        description: "Formato de saída"
        required: true
        type: choice
        default: all
        options:
          - all
          - wide
          - reels
          - feed
          - gif
          - carousel

jobs:
  render:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: v2/package-lock.json
      - run: npm ci
      - run: npx remotion browser ensure
      - run: npm run render -- "${{ inputs.slug }}" --format="${{ inputs.format }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.slug }}-${{ inputs.format }}
          path: v2/out/${{ inputs.slug }}/
          retention-days: 30
